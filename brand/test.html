<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Big+Shoulders+Display:wght@700;800;900&family=Oswald:wght@600;700;800&family=Staatliches&family=Passion+One:wght@900&family=Fjalla+One&family=Teko:wght@700&display=swap" rel="stylesheet">
  <style>
    body { margin:0; padding:20px; background:#1a1a1a; color:#fff; font-family:system-ui; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap:20px; }
    .stage { position:relative; width:612px; height:573px; background:#3B2C25; }
    .stage img { display:block; width:100%; height:100%; image-rendering:pixelated; }
    .stage svg { position:absolute; inset:0; width:100%; height:100%; opacity:0.7; }
    .label { padding:10px 0; font-size:12px; letter-spacing:0.1em; color:#aaa; }
    h2 { font-size:13px; color:#888; letter-spacing:0.15em; margin:30px 0 10px; }
  </style>
</head>
<body>

<h2>FONT BATTLE — 9 candidates, all with same A+C config</h2>
<div class="grid">

  <!-- 1: Anton -->
  <div>
    <div class="stage">
      <img src="../images/logo.gif">
      <svg viewBox="0 0 204 191"><g font-family="Anton" fill="#ff3366" stroke="#ff3366">
        <text x="-2" y="128" font-size="148" fill="none" stroke-width="1.3">A</text>
        <text x="54" y="122" font-size="148" fill="none" stroke-width="1.3">C</text>
        <text x="2" y="180" font-size="58">AC</text>
      </g></svg>
    </div>
    <div class="label">1 — Anton</div>
  </div>
