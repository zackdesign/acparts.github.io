<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Logo overlay — Anton tuning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Big+Shoulders+Display:wght@900&family=Oswald:wght@700&display=swap" rel="stylesheet">
  <style>
    body { margin:0; padding: 2rem; background: #1a1a1a; color: #eee; font-family: system-ui; }
    h2 { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: #888; margin: 2rem 0 0.5rem; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; align-items: flex-start; }
    .label { font-size: 0.72rem; letter-spacing: 0.1em; color: #aaa; margin-top: 0.4rem; }

    .stage {
      position: relative;
      width: 612px; height: 573px;  /* 3x original 204x191 */
      background: #3B2C25;
      overflow: hidden;
    }
    .stage img { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
    .stage svg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }
    .stage.diff svg { mix-blend-mode: difference; }
    .stage.diff img { filter: none; }
  </style>
</head>
<body>

  <h2>Side by side at 3x — original vs Anton tuned</h2>
  <div class="row">
    <div>
      <div class="stage"><img src="../images/logo.gif" alt="original"></div>
      <div class="label">Original</div>
    </div>
    <div>
      <div class="stage">
        <svg viewBox="0 0 204 191" xmlns="http://www.w3.org/2000/svg">
          <g font-family="'Anton', sans-serif" fill="#3D8681" stroke="#3D8681">
            <text x="-2"  y="128" font-size="148" fill="none" stroke-width="1.3">A</text>
            <text x="54"  y="122" font-size="148" fill="none" stroke-width="1.3">C</text>
            <text x="2"   y="180" font-size="58" stroke="none">AC</text>
          </g>
        </svg>
      </div>
      <div class="label">Anton — tuned v1</div>
    </div>
  </div>

  <h2>Pink overlay at 55% (deviations highlighted)</h2>
  <div class="row">
    <div>
      <div class="stage">
        <img src="../images/logo.gif" alt="original">
        <svg viewBox="0 0 204 191" xmlns="http://www.w3.org/2000/svg" style="opacity:.6">
          <g font-family="'Anton', sans-serif" fill="#ff4d6d" stroke="#ff4d6d">
            <text x="-2"  y="128" font-size="148" fill="none" stroke-width="1.3">A</text>
            <text x="54"  y="122" font-size="148" fill="none" stroke-width="1.3">C</text>
            <text x="2"   y="180" font-size="58" stroke="none">AC</text>
          </g>
        </svg>
      </div>
      <div class="label">Anton tuned v1</div>
    </div>
    <div>
      <div class="stage">
        <img src="../images/logo.gif" alt="original">
        <svg viewBox="0 0 204 191" xmlns="http://www.w3.org/2000/svg" style="opacity:.6">
          <g font-family="'Bebas Neue', sans-serif" fill="#ff4d6d" stroke="#ff4d6d">
            <text x="0"   y="128" font-size="152" fill="none" stroke-width="1.3">A</text>
            <text x="58"  y="122" font-size="152" fill="none" stroke-width="1.3">C</text>
            <text x="2"   y="180" font-size="56" stroke="none">AC</text>
          </g>
        </svg>
      </div>
      <div class="label">Bebas Neue tuned</div>
    </div>
    <div>
      <div class="stage">
        <img src="../images/logo.gif" alt="original">
        <svg viewBox="0 0 204 191" xmlns="http://www.w3.org/2000/svg" style="opacity:.6">
          <g font-family="'Big Shoulders Display', sans-serif" font-weight="900" fill="#ff4d6d" stroke="#ff4d6d">
            <text x="-4"  y="128" font-size="142" fill="none" stroke-width="1.3">A</text>
            <text x="52"  y="122" font-size="142" fill="none" stroke-width="1.3">C</text>
            <text x="2"   y="180" font-size="58" stroke="none">AC</text>
          </g>
        </svg>
      </div>
      <div class="label">Big Shoulders tuned</div>
    </div>
  </div>

  <h2>Difference blend — perfect match goes black, deviations glow</h2>
  <div class="row">
    <div>
      <div class="stage diff">
        <img src="../images/logo.gif" alt="original">
        <svg viewBox="0 0 204 191" xmlns="http://www.w3.org/2000/svg">
          <g font-family="'Anton', sans-serif" fill="#3D8681" stroke="#3D8681">
            <text x="-2"  y="128" font-size="148" fill="none" stroke-width="1.3">A</text>
            <text x="54"  y="122" font-size="148" fill="none" stroke-width="1.3">C</text>
            <text x="2"   y="180" font-size="58" stroke="none">AC</text>
          </g>
        </svg>
      </div>
      <div class="label">Anton diff</div>
    </div>
    <div>
      <div class="stage diff">
        <img src="../images/logo.gif" alt="original">
        <svg viewBox="0 0 204 191" xmlns="http://www.w3.org/2000/svg">
          <g font-family="'Bebas Neue', sans-serif" fill="#3D8681" stroke="#3D8681">
            <text x="0"   y="128" font-size="152" fill="none" stroke-width="1.3">A</text>
            <text x="58"  y="122" font-size="152" fill="none" stroke-width="1.3">C</text>
            <text x="2"   y="180" font-size="56" stroke="none">AC</text>
          </g>
        </svg>
      </div>
      <div class="label">Bebas Neue diff</div>
    </div>
  </div>

</body>
</html>
