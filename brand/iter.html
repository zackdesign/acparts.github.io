<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@900&display=swap" rel="stylesheet">
  <style>
    body { margin:0; padding:10px; background:#111; font-family:system-ui; color:#888; }
    .row { display:flex; gap:10px; margin-bottom:10px; }
    .stage { position:relative; width:816px; height:764px; background:#3B2C25; }
    .stage img { display:block; width:100%; height:100%; image-rendering:pixelated; }
    .stage svg { position:absolute; inset:0; width:100%; height:100%; opacity:0.55; }
    .label { font-size:11px; letter-spacing:0.08em; padding:6px 0; color:#999; text-transform:uppercase; }
  </style>
</head>
<body>

<div class="row">
  <div>
    <div class="stage"><img src="../images/logo.gif"></div>
    <div class="label">original</div>
  </div>

  <div>
    <div class="stage">
      <img src="../images/logo.gif">
      <svg viewBox="0 0 204 191"><g font-family="Exo 2" font-weight="900" fill="#ff3366" stroke="#ff3366" stroke-width="1.3">
        <text x="0" y="191" font-size="220" fill="none">A</text>
        <text x="204" y="158" font-size="220" fill="none" text-anchor="end">C</text>
        <text x="10" y="180" font-size="58" stroke="none">AC</text>
      </g></svg>
    </div>
    <div class="label">v7 — size 220</div>
  </div>
</div>

</body>
</html>
