<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AC Parts — logo lockup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@900&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal: #3D8681;
      --bone: #F4F1EA;
      --brown: #3B2C25;
      --ink: #1C1E1F;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bone);
      color: var(--ink);
      padding: 4rem 2rem;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--teal);
      margin: 0 auto 2rem;
      max-width: 720px;
    }

    .panel {
      max-width: 720px;
      margin: 0 auto 2rem;
      padding: 4rem 3rem;
      border: 1px solid #C9C4BA;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .panel.bone { background: var(--bone); }
    .panel.brown { background: var(--brown); border-color: var(--brown); }
    .panel.ink { background: var(--ink); border-color: var(--ink); }

    /* Lockup — the SVG positions the solid "AC" at the bottom-left;
       the tagline is HTML text positioned next to it. */
    .lockup {
      position: relative;
      display: inline-block;
      line-height: 0;
    }
    .lockup .mark {
      display: block;
      width: 280px;
      height: auto;
    }
    .lockup .tagline {
      position: absolute;
      bottom: 4.5%;
      left: 31%;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 400;
      font-size: calc(280px * 0.062);
      line-height: 1;
      letter-spacing: 0.01em;
      color: var(--teal);
      white-space: nowrap;
    }

    /* On dark grounds, invert the teal to bone */
    .panel.brown .lockup :is(svg text, .tagline),
    .panel.ink .lockup :is(svg text, .tagline) {
      color: var(--bone);
    }
    .panel.brown .lockup svg text,
    .panel.ink .lockup svg text {
      fill: var(--bone);
      stroke: var(--bone);
    }

    .caption {
      max-width: 720px;
      margin: -1rem auto 2.5rem;
      font-size: 0.75rem;
      color: #6b6b6b;
      text-align: center;
    }

    /* Small-size variant (header use) */
    .lockup.small .mark { width: 140px; }
    .lockup.small .tagline { font-size: calc(140px * 0.062); }

    /* Extra-small (favicon-ish) */
    .lockup.tiny .mark { width: 72px; }
    .lockup.tiny .tagline { display: none; }

    .size-row {
      max-width: 720px;
      margin: 0 auto 2rem;
      padding: 2rem 3rem;
      display: flex;
      gap: 3rem;
      align-items: flex-end;
      justify-content: center;
      border: 1px solid #C9C4BA;
      border-radius: 4px;
      background: var(--bone);
    }
  </style>
</head>
<body>

  <h1>Logo · on bone (original palette restored)</h1>
  <div class="panel bone">
    <div class="lockup">
      <svg class="mark" viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg" aria-label="AC">
        <g font-family="'Big Shoulders Display', Impact, 'Arial Narrow', sans-serif" font-weight="900">
          <text x="2" y="138" font-size="168" fill="none" stroke="#3D8681" stroke-width="1.2">A</text>
          <text x="66" y="128" font-size="168" fill="none" stroke="#3D8681" stroke-width="1.2">C</text>
          <text x="4" y="192" font-size="62" fill="#3D8681">AC</text>
        </g>
      </svg>
      <span class="tagline">service and parts</span>
    </div>
  </div>
  <div class="caption">SVG = mark; "service and parts" is HTML + Space Grotesk</div>

  <h1>Logo · on original brown ground</h1>
  <div class="panel brown">
    <div class="lockup">
      <svg class="mark" viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg" aria-label="AC">
        <g font-family="'Big Shoulders Display', Impact, 'Arial Narrow', sans-serif" font-weight="900">
          <text x="2" y="138" font-size="168" fill="none" stroke="#3D8681" stroke-width="1.2">A</text>
          <text x="66" y="128" font-size="168" fill="none" stroke="#3D8681" stroke-width="1.2">C</text>
          <text x="4" y="192" font-size="62" fill="#3D8681">AC</text>
        </g>
      </svg>
      <span class="tagline">service and parts</span>
    </div>
  </div>

  <h1>Logo · on ink</h1>
  <div class="panel ink">
    <div class="lockup">
      <svg class="mark" viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg" aria-label="AC">
        <g font-family="'Big Shoulders Display', Impact, 'Arial Narrow', sans-serif" font-weight="900">
          <text x="2" y="138" font-size="168" fill="none" stroke="#3D8681" stroke-width="1.2">A</text>
          <text x="66" y="128" font-size="168" fill="none" stroke="#3D8681" stroke-width="1.2">C</text>
          <text x="4" y="192" font-size="62" fill="#3D8681">AC</text>
        </g>
      </svg>
      <span class="tagline">service and parts</span>
    </div>
  </div>

  <h1>Size test — header / footer / favicon</h1>
  <div class="size-row">
    <div class="lockup">
      <svg class="mark" viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg" aria-label="AC">
        <g font-family="'Big Shoulders Display', Impact, 'Arial Narrow', sans-serif" font-weight="900">
          <text x="2" y="138" font-size="168" fill="none" stroke="#3D8681" stroke-width="1.2">A</text>
          <text x="66" y="128" font-size="168" fill="none" stroke="#3D8681" stroke-width="1.2">C</text>
          <text x="4" y="192" font-size="62" fill="#3D8681">AC</text>
        </g>
      </svg>
      <span class="tagline">service and parts</span>
    </div>
    <div class="lockup small">
      <svg class="mark" viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg" aria-label="AC">
        <g font-family="'Big Shoulders Display', Impact, 'Arial Narrow', sans-serif" font-weight="900">
          <text x="2" y="138" font-size="168" fill="none" stroke="#3D8681" stroke-width="1.2">A</text>
          <text x="66" y="128" font-size="168" fill="none" stroke="#3D8681" stroke-width="1.2">C</text>
          <text x="4" y="192" font-size="62" fill="#3D8681">AC</text>
        </g>
      </svg>
      <span class="tagline">service and parts</span>
    </div>
    <div class="lockup tiny">
      <svg class="mark" viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg" aria-label="AC">
        <g font-family="'Big Shoulders Display', Impact, 'Arial Narrow', sans-serif" font-weight="900">
          <text x="2" y="138" font-size="168" fill="none" stroke="#3D8681" stroke-width="1.2">A</text>
          <text x="66" y="128" font-size="168" fill="none" stroke="#3D8681" stroke-width="1.2">C</text>
          <text x="4" y="192" font-size="62" fill="#3D8681">AC</text>
        </g>
      </svg>
    </div>
  </div>

</body>
</html>
